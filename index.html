<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VE7PMC – Project Index</title>

  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 0;
      background: #f5f7fa;
      color: #222;
      line-height: 1.6;
    }

    header {
      background: #1a3d6d;
      color: white;
      padding: 2.5rem 1rem;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 2.4rem;
      font-weight: 600;
    }

    header p {
      margin-top: 0.5rem;
      font-size: 1.1rem;
      opacity: 0.9;
    }

    main {
      max-width: 800px;
      margin: 2rem auto;
      padding: 0 1rem;
    }

    .project-list {
      list-style: none;
      padding: 0;
      margin: 2rem 0;
    }

    .project-list li {
      background: white;
      margin: 0.75rem 0;
      padding: 1rem 1.25rem;
      border-radius: 8px;
      border: 1px solid #ddd;
      transition: box-shadow 0.2s ease;
    }

    .project-list li:hover {
      box-shadow: 0 3px 10px rgba(0,0,0,0.08);
    }

    a {
      color: #1a3d6d;
      text-decoration: none;
      font-weight: 600;
    }

    footer {
      text-align: center;
      padding: 2rem;
      font-size: 0.9rem;
      color: #666;
    }
  </style>
</head>

<body>
  <header>
    <h1>VE7PMC</h1>
    <p>Project Index & GitHub Pages Landing Site</p>
  </header>

  <main>
    <h2>Projects</h2>
    <p>Browse my public GitHub Pages projects below:</p>

    <ul class="project-list">
      <li><a href="/project-one">Project One</a></li>
      <li><a href="/project-two">Project Two</a></li>
      <li><a href="/another-repo">Another Repo</a></li>
    </ul>

    <p>You can add or remove items from this list anytime by editing <code>index.html</code>.</p>
  </main>

  <footer>
    © VE7PMC — GitHub Pages
  </footer>
</body>
</html>
